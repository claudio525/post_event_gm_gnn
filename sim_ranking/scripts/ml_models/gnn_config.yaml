### All paths specified are relative to the environment variable $wdata

# General settings
seed: 42

# IMs
im_set: "all"

# Input data settings
#rel_obs_data_ffp: gm_datasets/nz_gmdb/v3.4/Tables/ground_motion_im_table_rotd50_flat.csv
rel_obs_data_ffp: gm_datasets/nz_gmdb/v4.1/Tables/ground_motion_im_table_rotd50_flat.csv
max_dist: 30
closest_max_dist: 10
max_n_obs_sites: 10
min_n_obs_sites: 2

### Scenario Weighting
# Magnitude
mag_scenario_weighting: True
mag_min_weight: 1
mag_max_weight: 5
mag_start: 4.8
mag_end: 6.0
# DoC
doc_scenario_weighting: True
doc_min_weight: 1
doc_max_weight: 2
doc_start: 1
doc_end: 6


ignore_events: ["3468575"]

# Features
graph_feature_keys:
  edge:
    - "dist"
    - "angular_dist"
    - "vs30_site_int"
    - "vs30_diff"
    - "tsite_site_int"
    - "tsite_diff"
    - "rrup_site_int"
    - "rrup_diff"
  site_int:
    - "vs30_site_int"
#    - "z1p0_site_int"
#    - "z2p5_site_int"
    - "tsite_site_int"
    - "rrup_site_int"
    - "mag"
  site_obs:
#    - "vs30_site_obs"
#    - "z1p0_site_obs"
#    - "z2p5_site_obs"
#    - "tsite_site_obs"
#    - "rrup_site_obs"

# Model settings
scale_IMs: True

# Hyperparameters
n_epochs: 100
batch_size: 650

fc_n_units: null
fcc_act_fn: null

int_embedding_act_fn: null
obs_embedding_act_fn: null
edge_embedding_act_fn: null
n_att_heads: [8, 8]
n_int_node_channels: [4, 4]
n_obs_node_channels: [48, 48]
n_edge_channels: [4, 4]
gcn_act_fn: "relu"

att_n_units: [8]
att_act_fn: "tanh"

l2_reg: 0.0007
dropout_rate: 0.05

# Output settings
rel_results_dir: sim_ranking/results/gnn