### All paths specified are relative to the environment variable $wdata

# General settings
seed: 42

# Input data settings
#rel_obs_data_ffp: gm_datasets/nz_gmdb/v3.4/Tables/ground_motion_im_table_rotd50_flat.csv
rel_obs_data_ffp: gm_datasets/nz_gmdb/v4.0/Tables/ground_motion_im_table_rotd50_flat.csv
max_dist: 30
closest_max_dist: 10
max_n_obs_sites: 15
min_n_obs_sites: 2

ignore_events: ["3468575"]

# Features
graph_feature_keys:
  edge:
    - "dist"
    - "angular_dist"
    - "vs30_site_int"
    - "vs30_diff"
    - "tsite_site_int"
    - "tsite_diff"
    - "rrup_site_int"
    - "rrup_diff"
  site_int:
    - "vs30_site_int"
#    - "z1p0_site_int"
#    - "z2p5_site_int"
    - "tsite_site_int"
    - "rrup_site_int"
    - "mag"
  site_obs:
#    - "vs30_site_obs"
#    - "z1p0_site_obs"
#    - "z2p5_site_obs"
#    - "tsite_site_obs"
#    - "rrup_site_obs"

# Model settings
scale_IMs: True

# Hyperparameters
n_epochs: 100
batch_size: 512

fc_n_units: null
fcc_act_fn: null

int_embedding_act_fn: null
obs_embedding_act_fn: null
n_att_heads: [5, 5]
n_int_node_channels: [8, 8]
n_obs_node_channels: [32, 32]
gcn_act_fn: "elu"

att_n_units: [8, 8]
att_act_fn: "tanh"

l2_reg: 0.001

# Output settings
rel_results_dir: sim_ranking/results/gnn/simple